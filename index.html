<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA configuration and styling -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1B4D3E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/pwa_icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />

    <!-- Open Graph / Link Sharing Metadata (Facebook, WhatsApp, LinkedIn, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.mollikbuildersltd.com/" />
    <meta property="og:title" content="MOLLIK BUILDERS LTD" />
    <meta property="og:description" content="Premium Real Estate Development in Dhaka. Architectural safety, structural integrity, and luxury living spaces." />
    <meta property="og:image" content="https://www.mollikbuildersltd.com/logo.JPG" />

    <!-- Twitter Link Sharing Metadata -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MOLLIK BUILDERS LTD" />
    <meta name="twitter:description" content="Premium Real Estate Development in Dhaka. Architectural safety, structural integrity, and luxury living spaces." />
    <meta name="twitter:image" content="https://www.mollikbuildersltd.com/logo.JPG" />

    <title>MOLLIK BUILDERS LTD</title>

    <!-- Async Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((registration) => {
              console.log("[PWA Server] Service Worker successfully registered with scope:", registration.scope);
            })
            .catch((error) => {
              console.error("[PWA Server] Service Worker registration failed:", error);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
