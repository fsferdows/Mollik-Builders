<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA configuration and styling -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1B4D3E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa_icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/pwa_icon.svg" />

    <title>MOLLIK BUILDERS LTD</title>

    <!-- Async Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((registration) => {
              console.log("[PWA Server] Service Worker successfully registered with scope:", registration.scope);
            })
            .catch((error) => {
              console.error("[PWA Server] Service Worker registration failed:", error);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
